name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python syntax
        run: python -m compileall -q tools/harness

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Verify packaged wheel contents
        run: |
          tmpdir="$(mktemp -d)"
          python -m pip wheel . --no-deps -w "$tmpdir"
          python - "$tmpdir" <<'PY'
          import pathlib
          import sys
          import zipfile

          wheel = next(pathlib.Path(sys.argv[1]).glob("*.whl"))
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())
          required = {
              "tools/harness/agent_session.py",
              "tools/harness/session_identity.py",
              "tools/harness/session_launcher.py",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"wheel is missing runtime files: {missing}")
          PY

      - name: Verify POSIX script line endings
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path("scripts/start_worker_session"),
              Path("scripts/ai_worker"),
              Path("scripts/bootstrap_consumer"),
              Path(".githooks/pre-commit"),
          ]
          bad = [str(path) for path in paths if b"\r\n" in path.read_bytes()]
          if bad:
              raise SystemExit(f"CRLF line endings are not allowed: {bad}")
          PY

      - name: Verify launcher help
        run: |
          scripts/start_worker_session --help
          scripts/ai_worker --help
          scripts/bootstrap_consumer --help

      - name: Verify ergonomic wrapper smoke path
        run: |
          scripts/ai_worker codex docs/specs/task-spec.md --print-command -- --model gpt-5.4

      - name: Verify bootstrap consumer path
        run: |
          tmpdir="$(mktemp -d)"
          git init "$tmpdir"
          scripts/bootstrap_consumer --target "$tmpdir" --copy-runtime
          scripts/bootstrap_consumer --target "$tmpdir" --copy-runtime --force
          test -f "$tmpdir/AGENTS.md"
          test -f "$tmpdir/scripts/ai_worker"
          test -f "$tmpdir/scripts/start_worker_session"
          test -f "$tmpdir/docs/public-contract.md"
          test -f "$tmpdir/docs/release-model.md"
          test -f "$tmpdir/docs/migration-guide.md"
          (
            cd "$tmpdir"
            ./scripts/ai_worker --help >/dev/null
            ./scripts/start_worker_session --help >/dev/null
            ./scripts/ai_worker codex docs/specs/task-spec.md --print-command -- --model gpt-5.4 >/dev/null
          )
          (
            cd "$tmpdir/docs/specs"
            ../../scripts/ai_worker codex task-spec.md --print-command -- --model gpt-5.4 >/dev/null
            ../../scripts/ai_worker codex docs/specs/task-spec.md --print-command -- --model gpt-5.4 >/dev/null
          )
